# kube-prometheus-stack'in Grafana'sinda varsayilan olarak acik olan
# datasource sidecar'i, "grafana_datasource: \"1\"" etiketli ConfigMap'leri
# otomatik olarak Grafana'ya datasource olarak ekler. Elle Grafana UI'a
# girip datasource eklemeye gerek kalmaz.
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-datasource
  namespace: monitoring
  labels:
    grafana_datasource: "1"
data:
  loki-datasource.yaml: |-
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        access: proxy
        # helm release adi "loki" oldugu icin servis adi da "loki" olur
        url: http://loki:3100
        isDefault: false
        editable: false
