apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-engine
  namespace: ai-engine
  labels:
    app: ai-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-engine
  template:
    metadata:
      labels:
        app: ai-engine
    spec:
      serviceAccountName: ai-engine
      containers:
        - name: ai-engine
          # Bu image kind cluster'ina 'kind load docker-image' ile yerel
          # olarak yuklenir, bir registry'ye push edilmesine gerek yok.
          image: ai-engine:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: OLLAMA_URL
              value: "http://ollama.ai-engine.svc.cluster.local:11434"
            - name: OLLAMA_MODEL
              value: "llama3.2:3b"
            - name: LOKI_URL
              value: "http://loki.monitoring.svc.cluster.local:3100"
            - name: TARGET_NAMESPACE
              value: "test-app"
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ai-engine
  namespace: ai-engine
spec:
  selector:
    app: ai-engine
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
