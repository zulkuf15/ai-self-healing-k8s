# kube-prometheus-stack Grafana sidecar'i, 'grafana_dashboard: "1"' etiketli
# ConfigMap'leri otomatik olarak Grafana'ya dashboard olarak yukler.
apiVersion: v1
kind: ConfigMap
metadata:
  name: system-health-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  system-health-dashboard.json: |-
    {
      "title": "Sistem Sağlığı - AI Self-Healing K8s",
      "uid": "system-health-overview",
      "timezone": "browser",
      "refresh": "10s",
      "time": { "from": "now-1h", "to": "now" },
      "schemaVersion": 39,
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Toplam Pod",
          "gridPos": { "h": 5, "w": 6, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [
            { "expr": "count(kube_pod_info)", "legendFormat": "pod" }
          ],
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" } } }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Çalışan Pod",
          "gridPos": { "h": 5, "w": 6, "x": 6, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [
            { "expr": "count(kube_pod_status_phase{phase=\"Running\"} == 1)", "legendFormat": "running" }
          ],
          "fieldConfig": { "defaults": { "color": { "mode": "fixed", "fixedColor": "green" } } }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Sorunlu Pod (Failed/Pending)",
          "gridPos": { "h": 5, "w": 6, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [
            { "expr": "count(kube_pod_status_phase{phase=~\"Failed|Pending\"} == 1) OR vector(0)", "legendFormat": "sorunlu" }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              }
            }
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Son 1 Saatte Pod Restart",
          "gridPos": { "h": 5, "w": 6, "x": 18, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [
            { "expr": "sum(increase(kube_pod_container_status_restarts_total[1h])) OR vector(0)", "legendFormat": "restart" }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              }
            }
          }
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Namespace Bazlı CPU Kullanımı",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 5 },
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace!=\"\", container!=\"\"}[5m])) by (namespace)",
              "legendFormat": "{{namespace}}"
            }
          ]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Namespace Bazlı Bellek Kullanımı",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 5 },
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace!=\"\", container!=\"\"}) by (namespace)",
              "legendFormat": "{{namespace}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "bytes" } }
        },
        {
          "id": 7,
          "type": "logs",
          "title": "Canlı Loglar (test-app, hata/uyarı filtresi)",
          "gridPos": { "h": 9, "w": 24, "x": 0, "y": 13 },
          "datasource": { "type": "loki", "uid": "Loki" },
          "targets": [
            {
              "expr": "{namespace=~\"test-app|ai-engine\"} |~ \"(?i)error|fail|exception\"",
              "refId": "A"
            }
          ]
        }
      ]
    }
