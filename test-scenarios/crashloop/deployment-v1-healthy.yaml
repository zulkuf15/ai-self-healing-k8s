# 1. ADIM: Once bu saglikli versiyonu deploy et. Uygulama sorunsuz calisir.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crashloop-demo
  namespace: test-app
  labels:
    app: crashloop-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crashloop-demo
  template:
    metadata:
      labels:
        app: crashloop-demo
    spec:
      containers:
        - name: crashloop-demo
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - "echo 'Uygulama saglikli calisiyor (v1)'; sleep infinity"
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits: { cpu: 50m, memory: 32Mi }
