# Ilk calistirmada kasten cokup, restart sonrasinda saglikli calisan bir
# test senaryosu -- gecici bir baslangic hatasini simule eder.
# PVC'ye yazilan "attempted" dosyasi, pod silinip yeniden olusturulsa bile
# kalir; bu sayede AI'in restart_pod aksiyonu GERCEKTEN sorunu cozer.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: crashloop-demo-state
  namespace: test-app
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 64Mi
  storageClassName: standard
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crashloop-demo
  namespace: test-app
  labels:
    app: crashloop-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crashloop-demo
  template:
    metadata:
      labels:
        app: crashloop-demo
    spec:
      containers:
        - name: crashloop-demo
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              if [ -f /data/attempted ]; then
                echo "Onceki denemeden sonra saglikli baslatildi, calisiyor."
                sleep infinity
              else
                echo "Uygulama baslatiliyor..."
                echo "HATA: veritabani baglantisi kurulamadi (connection refused)"
                touch /data/attempted
                sleep 2
                exit 1
              fi
          volumeMounts:
            - name: state
              mountPath: /data
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: crashloop-demo-state
